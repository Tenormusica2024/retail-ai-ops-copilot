<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Edge Contract Demo</title>
  <style>
    body {
      margin: 0;
      background: #f4f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .canvas {
      position: relative;
      width: 720px;
      height: 420px;
      margin: 24px;
      background:
        linear-gradient(#e7edf5 1px, transparent 1px),
        linear-gradient(90deg, #e7edf5 1px, transparent 1px),
        #fff;
      background-size: 24px 24px;
      border: 1px solid #c8d3df;
    }

    .connectors {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .node {
      position: absolute;
      width: 168px;
      min-height: 72px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 2px solid #7ab6ef;
      background: #eef8ff;
      color: #16324f;
      font-size: 14px;
      font-weight: 700;
    }

    .node.eval {
      border-color: #f59e0b;
      background: #fff8ed;
    }

    .node.cortex {
      border-color: #8b7cf6;
      background: #f6f3ff;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <svg class="connectors" viewBox="0 0 720 420" aria-hidden="true">
      <defs>
        <marker id="arrow-data" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse" markerUnits="strokeWidth">
          <path d="M 0.8 1.1 L 7 4 L 0.8 6.9 Z" fill="#526071" stroke="#526071" stroke-width="0.4"></path>
        </marker>
        <marker id="arrow-ops" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse" markerUnits="strokeWidth">
          <path d="M 0.8 1.1 L 7 4 L 0.8 6.9 Z" fill="#d97706" stroke="#d97706" stroke-width="0.4"></path>
        </marker>
      </defs>
    </svg>

    <section class="node" data-node-id="semantic-kpi-model" style="left: 92px; top: 96px;">
      Semantic KPI Model
    </section>
    <section class="node cortex" data-node-id="cortex-analyst-api" style="left: 448px; top: 118px;">
      Cortex Analyst API
    </section>
    <section class="node eval" data-node-id="golden-eval" style="left: 238px; top: 294px;">
      Golden Eval
    </section>
  </main>
</body>
</html>
