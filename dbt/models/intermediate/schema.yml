version: 2

models:
  - name: int_order_line_enriched
    description: Line-grain order, region, product, and cost enrichment for KPI marts.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_key, line_number]
    columns:
      - name: order_key
        data_tests: [not_null]
      - name: line_number
        data_tests: [not_null]
      - name: month_start
        data_tests: [not_null]
      - name: region_name
        data_tests: [not_null]
      - name: nation_name
        data_tests: [not_null]
      - name: category_name
        data_tests: [not_null]
      - name: quantity
        data_tests: [not_null, not_negative]
      - name: gross_sales
        data_tests: [not_null, not_negative]
      - name: discount_amount
        data_tests: [not_null, not_negative]
      - name: net_sales
        data_tests: [not_null, not_negative]
      - name: supply_cost_amount
        data_tests: [not_null, not_negative]
